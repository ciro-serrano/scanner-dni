<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner DNI | Registro</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">

    <div class="login-container">

        <div class="login-header">
            <div class="login-icon">📄</div>
            <h1>Scanner DNI</h1>
            <p>Creá tu cuenta de operador</p>
        </div>

        <form class="login-form" id="registroForm">

            <div class="form-group">
                <label for="nombre_operador">Nombre completo</label>
                <input
                    type="text"
                    id="nombre_operador"
                    name="nombre_operador"
                    placeholder="Ciro Serrano"
                    required
                />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="operador@mail.com"
                    required
                />
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    minlength="6"
                    required
                />
            </div>

            <div class="form-error" id="errorMsg" style="display:none"></div>
            <div class="form-success" id="successMsg" style="display:none"></div>

            <button type="submit" class="btn-primary" id="btnRegistro">
                Crear cuenta
            </button>

            <p class="login-footer">
                ¿Ya tenés cuenta? <a href="/login.html">Iniciar sesión</a>
            </p>

        </form>

    </div>

    <script src="assets/js/registro.js"></script>

</body>
</html>
