<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner DNI | Login</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">

    <div class="login-container">

        <div class="login-header">
            <div class="login-icon">📄</div>
            <h1>Scanner DNI</h1>
            <p>Ingresá tus credenciales para continuar</p>
        </div>

        <form class="login-form" id="loginForm">

            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="operador@mail.com"
                    required
                />
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    required
                />
            </div>

            <div class="form-error" id="errorMsg" style="display:none">
                Email o contraseña incorrectos
            </div>

            <button type="submit" class="btn-primary" id="btnLogin">
                Ingresar
            </button>
            
            <p class="login-footer">
                ¿No tenés cuenta? <a href="/registro.html">Crear una</a>
            </p>

        </form>

    </div>

    <script src="assets/js/login.js"></script>
</body>
</html>
